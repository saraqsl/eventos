<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Acceso Seguro SARA</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; transition: background 0.8s ease;
            background-color: #1a1a1a; color: white;
        }
        .container { 
            text-align: center; padding: 40px; border-radius: 20px; 
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 400px; 
        }
        input { 
            padding: 12px; margin-bottom: 15px; width: 85%; 
            border-radius: 8px; border: none; background: #fff;
            font-size: 16px; text-align: center; color: #333;
        }
        button { 
            padding: 12px 30px; cursor: pointer; background-color: #d9534f; 
            color: white; border: none; border-radius: 5px; font-weight: bold; 
            text-transform: uppercase;
        }
        .hidden { display: none; }
        #mensaje { margin-top: 20px; min-height: 40px; font-weight: 500; }
        .btn-link { 
            background-color: #5cb85c; margin-top: 15px; display: inline-block; 
            text-decoration: none; color: white; padding: 12px 25px; 
            border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    let usuarioActual = null;

    function validarIntegrante() {
        const id = document.getElementById('idIntegrante').value.trim().toLowerCase();
        const msg = document.getElementById('mensaje');

        if (integrantes[id]) {
            usuarioActual = integrantes[id];
            document.getElementById('paso1').classList.add('hidden');
            document.getElementById('paso2').classList.remove('hidden');
            document.getElementById('txtSaludo').innerText = `HOLA ${usuarioActual.nombre}`;
            document.body.style.background = usuarioActual.fondo;
            msg.innerHTML = "";
            document.getElementById('claveActividad').focus();
        } else {
            msg.innerHTML = "IDENTIDAD NO REGISTRADA";
            msg.style.color = "#ff4d4d";
        }
    }

    function validarActividad() {
        const actividad = document.getElementById('claveActividad').value.trim().toLowerCase();
        const msg = document.getElementById('mensaje');
        const btn = document.getElementById('btnFinal');

        if (usuarioActual && usuarioActual.permisos[actividad]) {
            msg.innerHTML = "ACCESO AUTORIZADO";
            msg.style.color = "#5cb85c";
            btn.href = usuarioActual.permisos[actividad];
            btn.classList.remove('hidden');
            document.getElementById('paso2').classList.add('hidden');
        } else {
            msg.innerHTML = "USTED NO TIENE PERMISO PARA ESTA ACTIVIDAD";
            msg.style.color = "#ff4d4d";
        }
    }
