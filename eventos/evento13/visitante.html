
<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ver QSL – braun</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #e5ebf0;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
}
h1 {
  color: #002b5c;
  text-align: center;
}
input, button {
  padding: 8px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  cursor: pointer;
  background: #003366;
  color: white;
  border: none;
}
canvas {
  margin-top: 10px;
  border: 2px solid #003366;
  max-width: 530px;
  width: 100%;
}
.qslCard {
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>🔎 Ver QSL aniv Fuerza Aeronaval N° 3</h1>

<input type="text" id="sdVisitante" placeholder="Ingrese su SD">
<button onclick="verQSL()">Ver mis QSLs</button>

<div id="accionesDescarga" style="display:none;">
  <button onclick="descargarTodas()">📦 Descargar ZIP</button>
  <button onclick="descargarActual()">🖼️ Descargar 1°</button>
  <button onclick="copiarActual()">📋 Copiar</button>
</div>

<div id="qslContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.0/dist/jszip.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxxt4WEt60A_hRN6VNjWYaScxnB2B_X9kMEsKw2j2CoKJGE7TJN9CPazYfWXdUo-vVt1A/exec";
const IMG_QSL = "qsl1.png";

let canvasesGenerados = [];

// 🧩 Generar QSL
function generarQSL(activador, contacto) {
  return new Promise((resolve) => {

    const card = document.createElement('div');
    card.className = 'qslCard';

    const canvas = document.createElement('canvas');
    canvas.width = 800;
    canvas.height = 420;
    const ctx = canvas.getContext('2d');

    const img = new Image();
    img.src = IMG_QSL;

    img.onload = () => {

      // Fondo
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // 🔠 Activador centrado arriba
ctx.font = 'bold 72px "Arial Black", sans-serif';
ctx.textAlign = 'center';

// 🎨 degradado celeste - blanco - celeste
const grad = ctx.createLinearGradient(0, 20, 0, 90);
grad.addColorStop(0, "#74ACDF");
grad.addColorStop(0.45, "#FFFFFF");
grad.addColorStop(0.55, "#FFFFFF");
grad.addColorStop(1, "#74ACDF");

// 🌑 sombra
ctx.shadowColor = "rgba(0,0,0,0.5)";
ctx.shadowBlur = 6;
ctx.shadowOffsetX = 2;
ctx.shadowOffsetY = 2;

// 🔲 borde oscuro
ctx.lineWidth = 4;
ctx.strokeStyle = "#002244";

// posición horizontal arriba
ctx.strokeText(activador, canvas.width / 2, 70);

ctx.fillStyle = grad;
ctx.fillText(activador, canvas.width / 2, 70);

      // Texto inferior
      ctx.font = 'bold 18px Arial';
      ctx.fillStyle ='#ffffff';
      ctx.textAlign = 'center';

      const linea1 = `QSO con ${contacto.call}  Fecha: ${contacto.date}`;
      const linea2 = `Hora UTC: ${contacto.time}  Banda: ${contacto.band}  Modo: ${contacto.mode}  RST: ${contacto.rst}`;

      ctx.fillText(linea1, canvas.width / 2, canvas.height - 35);
      ctx.fillText(linea2, canvas.width / 2, canvas.height - 10);

      // Botón individual
      const btn = document.createElement('button');
      btn.textContent = "⬇️ Descargar esta QSL";
      btn.onclick = () => descargarIndividual(canvas, activador, contacto.call);

      card.appendChild(canvas);
      card.appendChild(btn);

      document.getElementById('qslContainer').appendChild(card);

      canvasesGenerados.push({canvas, activador, visitante: contacto.call});

      resolve();
    };

    img.onerror = () => {
      console.error("Error cargando imagen");
      resolve();
    };
  });
}

// 🔎 Buscar QSLs
async function verQSL() {
  const sd = document.getElementById('sdVisitante').value.trim().toUpperCase();
  if (!sd) return alert("Ingrese su SD");

  const container = document.getElementById('qslContainer');
  container.innerHTML = "Cargando...";
  canvasesGenerados = [];

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    container.innerHTML = "";
    let encontrados = 0;

    for (const c of data) {
      if (c.call === sd) {
        await generarQSL(c.owner, c);
        encontrados++;
      }
    }

    document.getElementById('accionesDescarga').style.display =
      encontrados ? 'block' : 'none';

    if (!encontrados) {
      container.textContent = "No se encontraron QSLs.";
    }

  } catch (e) {
    container.textContent = "Error cargando datos.";
  }
}

// 📦 ZIP
async function descargarTodas() {
  const zip = new JSZip();

  canvasesGenerados.forEach(c => {
    const base64 = c.canvas.toDataURL().split(',')[1];
    zip.file(`${c.activador}_${c.visitante}.png`, base64, {base64:true});
  });

  const blob = await zip.generateAsync({type:"blob"});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "qsls.zip";
  link.click();
}

// 🖼️ Descargar primera
function descargarActual() {
  if (!canvasesGenerados.length) return;
  const link = document.createElement('a');
  link.download = "qsl.jpg";
  link.href = canvasesGenerados[0].canvas.toDataURL("image/jpeg");
  link.click();
}

// 🖼️ Descargar individual
function descargarIndividual(canvas, activador, visitante) {
  const link = document.createElement('a');
  link.download = `${activador}_${visitante}.jpg`;
  link.href = canvas.toDataURL("image/jpeg");
  link.click();
}

// 📋 Copiar
async function copiarActual() {
  if (!canvasesGenerados.length) return;

  const blob = await new Promise(r =>
    canvasesGenerados[0].canvas.toBlob(r)
  );

  await navigator.clipboard.write([
    new ClipboardItem({ 'image/png': blob })
  ]);

  alert("Imagen copiada");
}
</script>

</body>
</html>
